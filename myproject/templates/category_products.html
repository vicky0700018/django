<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products by Category</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .category {
            margin-bottom: 50px;
        }

        .category-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .category-header img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .description {
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<h1>Products by Category</h1>

{% for category in categories %}
<div class="category">

    <div class="category-header">
        {% if category.category_image %}
            <img src="{{ category.category_image.url }}" alt="{{ category.category_name }}">
        {% endif %}
        <h2>{{ category.category_name }}</h2>
    </div>

    <!-- <div class="products">
        {% for product in category.products.all %}
        <div class="product-card">
            <img src="{{ product.product_image.url }}" alt="{{ product.product_name }}">
            
            <div class="product-name">{{ product.product_name }}</div>
            
            <div class="price">₹{{ product.product_price }}</div>
            
            <div class="description">
                {{ product.product_description|truncatewords:10 }}
            </div>
        </div>
        {% empty %}
        <p>No products available in this category.</p>
        {% endfor %}
    </div> -->

</div>
{% endfor %}

</body>
</html>
